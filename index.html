<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق Sufi Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --accent: #8b5cf6; /* بنفسجي نيوني */
            --accent-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Login logic is same as before, styling updated */
        .login-container {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.2);
            border: 1px solid var(--border);
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: white;
            border-radius: 10px;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Main Chat Layout */
        .chat-container {
            display: none;
            width: 100%;
            height: 100vh;
            background: var(--bg-dark);
        }

        .chat-container.active { display: flex; }

        .sidebar {
            width: 350px;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .search-box {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            padding: 10px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: white;
            outline: none;
        }

        .request-section {
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            border-bottom: 2px solid var(--accent);
            display: none;
        }

        .request-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 8px;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .btn-small {
            padding: 4px 10px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .chat-list { flex: 1; overflow-y: auto; }

        .chat-item {
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: 0.3s;
        }

        .chat-item:hover { background: rgba(255, 255, 255, 0.05); }

        .main-chat { flex: 1; display: flex; flex-direction: column; background: #0b1120; }

        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        .message { max-width: 70%; padding: 12px; border-radius: 15px; position: relative; }
        .message-out { align-self: flex-end; background: var(--accent); color: white; }
        .message-in { align-self: flex-start; background: var(--bg-card); color: white; }

        .image-msg { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .video-msg { max-width: 100%; border-radius: 10px; }

        .input-area {
            padding: 20px;
            background: var(--bg-card);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area textarea {
            flex: 1;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 10px;
            resize: none;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <div class="login-container" id="loginPage">
        <h2 style="text-align:center; margin-bottom: 20px;">Sufi Chat ⚡</h2>
        <input type="text" id="username" class="input-field" placeholder="اسم المستخدم">
        <input type="password" id="password" class="input-field" placeholder="كلمة المرور">
        <button onclick="login()" class="btn-primary">دخول</button>
    </div>

    <div class="chat-container" id="chatApp">
        <div class="sidebar">
            <div style="padding: 15px; background: var(--accent);">
                <b id="myUserLabel"></b> (أنت)
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن صديق..." oninput="handleSearch()">
            </div>

            <div class="request-section" id="requestSection">
                <p style="font-size: 0.8rem; color: var(--accent);">طلبات صداقة واصلة:</p>
                <div id="requestsList"></div>
            </div>

            <div class="chat-list" id="chatList">
                </div>
            
            <button onclick="logout()" style="padding: 10px; background: #ef4444; color:white; border:none; cursor:pointer;">تسجيل خروج</button>
        </div>

        <div class="main-chat">
            <div id="chatHeader" style="padding: 15px; background: var(--bg-card); border-bottom: 1px solid var(--border); display:none;">
                <b id="activeFriendName"></b>
            </div>
            
            <div class="messages-container" id="messagesContainer">
                <div style="margin: auto; color: var(--text-dim);">اختر صديقاً لبدء الدردشة</div>
            </div>

            <div class="input-area" id="inputArea" style="display: none;">
                <label class="icon-btn">🖼️<input type="file" id="imgInput" hidden accept="image/*" onchange="sendFile('image')"></label>
                <label class="icon-btn">📹<input type="file" id="vidInput" hidden accept="video/*" onchange="sendFile('video')"></label>
                <textarea id="msgInput" placeholder="اكتب شيئاً..." rows="1"></textarea>
                <button onclick="sendText()" class="btn-primary" style="width: auto; padding: 10px 20px;">إرسال</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script>
        const ABLY_KEY = '_kLb1w.KqoPuA:o7et4-MjbXulWY3vGEsl_SbIS1Od7vX2MT0U6zpzrJA';
        const ALL_USERS = ['3tx', '2tx', '4tx', 'Sufi', 'Baron']; // قاعدة بيانات وهمية للبحث
        
        let currentUser = localStorage.getItem('user');
        let friends = JSON.parse(localStorage.getItem('friends_' + currentUser) || '[]');
        let requests = JSON.parse(localStorage.getItem('requests_' + currentUser) || '[]');
        let activeChat = null;
        let ably, channel;

        if(currentUser) showChat();

        function login() {
            const user = document.getElementById('username').value.trim();
            if(user) {
                currentUser = user;
                localStorage.setItem('user', user);
                showChat();
            }
        }

        function showChat() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('chatApp').classList.add('active');
            document.getElementById('myUserLabel').innerText = currentUser;
            
            ably = new Ably.Realtime(ABLY_KEY);
            channel = ably.channels.get('global-chat');

            // استقبال البيانات
            channel.subscribe((msg) => {
                const data = msg.data;
                
                // طلب صداقة موجه لي
                if(msg.name === 'friend-request' && data.to === currentUser) {
                    if(!requests.includes(data.from)) {
                        requests.push(data.from);
                        updateUI();
                    }
                }
                
                // قبول طلب الصداقة
                if(msg.name === 'accept-request' && data.to === currentUser) {
                    addFriend(data.from);
                }

                // محادثة خاصة (تأكد ان المرسل او المستقبل هو انا)
                if(msg.name === 'private-msg' && (data.to === currentUser || data.from === currentUser)) {
                    if(activeChat === data.from || activeChat === data.to) {
                        displayMessage(data);
                    }
                    saveHistory(data);
                }
            });

            updateUI();
        }

        function handleSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('chatList');
            list.innerHTML = '';

            ALL_USERS.forEach(u => {
                if(u !== currentUser && u.toLowerCase().includes(term)) {
                    const isFriend = friends.includes(u);
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.innerHTML = `
                        <span>${u}</span>
                        ${isFriend ? '<span style="color:var(--success)">صديق</span>' : 
                        `<button class="btn-small btn-primary" onclick="sendFriendRequest('${u}')">إرسال طلب</button>`}
                    `;
                    if(isFriend) div.onclick = () => openChat(u);
                    list.appendChild(div);
                }
            });
        }

        function sendFriendRequest(to) {
            channel.publish('friend-request', { from: currentUser, to: to });
            alert('تم إرسال الطلب إلى ' + to);
        }

        function acceptFriend(from) {
            requests = requests.filter(r => r !== from);
            addFriend(from);
            channel.publish('accept-request', { from: currentUser, to: from });
            updateUI();
        }

        function addFriend(name) {
            if(!friends.includes(name)) {
                friends.push(name);
                localStorage.setItem('friends_' + currentUser, JSON.stringify(friends));
                updateUI();
            }
        }

        function updateUI() {
            // تحديث قائمة الطلبات
            const reqList = document.getElementById('requestsList');
            const reqSection = document.getElementById('requestSection');
            reqList.innerHTML = '';
            
            if(requests.length > 0) {
                reqSection.style.display = 'block';
                requests.forEach(r => {
                    reqList.innerHTML += `
                        <div class="request-item">
                            ${r}
                            <button class="btn-small" style="background:var(--success); color:white;" onclick="acceptFriend('${r}')">قبول</button>
                        </div>`;
                });
            } else {
                reqSection.style.display = 'none';
            }

            // تحديث قائمة الأصدقاء (إذا ماكو بحث)
            if(!document.getElementById('searchInput').value) {
                const list = document.getElementById('chatList');
                list.innerHTML = '<p style="padding:10px; color:var(--text-dim)">أصدقاؤك:</p>';
                friends.forEach(f => {
                    list.innerHTML += `
                        <div class="chat-item" onclick="openChat('${f}')">
                            <span>👤 ${f}</span>
                        </div>`;
                });
            }
        }

        function openChat(name) {
            activeChat = name;
            document.getElementById('chatHeader').style.display = 'block';
            document.getElementById('activeFriendName').innerText = name;
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('messagesContainer').innerHTML = '';
            
            // تحميل الهستوري
            const history = JSON.parse(localStorage.getItem(`chat_${currentUser}_${name}`) || '[]');
            history.forEach(displayMessage);
        }

        function sendText() {
            const text = document.getElementById('msgInput').value;
            if(!text || !activeChat) return;
            
            const msg = { from: currentUser, to: activeChat, type: 'text', content: text, time: Date.now() };
            channel.publish('private-msg', msg);
            document.getElementById('msgInput').value = '';
        }

        async function sendFile(type) {
            const input = type === 'image' ? document.getElementById('imgInput') : document.getElementById('vidInput');
            const file = input.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const msg = { from: currentUser, to: activeChat, type: type, content: e.target.result, time: Date.now() };
                channel.publish('private-msg', msg);
            };
            reader.readAsDataURL(file);
        }

        function displayMessage(msg) {
            const container = document.getElementById('messagesContainer');
            const isMe = msg.from === currentUser;
            const div = document.createElement('div');
            div.className = `message ${isMe ? 'message-out' : 'message-in'}`;
            
            if(msg.type === 'text') div.innerText = msg.content;
            else if(msg.type === 'image') div.innerHTML = `<img src="${msg.content}" class="image-msg">`;
            else if(msg.type === 'video') div.innerHTML = `<video src="${msg.content}" controls class="video-msg"></video>`;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function saveHistory(msg) {
            const other = msg.from === currentUser ? msg.to : msg.from;
            const key = `chat_${currentUser}_${other}`;
            const history = JSON.parse(localStorage.getItem(key) || '[]');
            history.push(msg);
            localStorage.setItem(key, JSON.stringify(history));
        }

        function logout() {
            localStorage.removeItem('user');
            location.reload();
        }
    </script>
</body>
</html>

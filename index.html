<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>صوفي توك - دردشة فورية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0B0F1C;
            color: #F1F5F9;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0F172A 0%, #0B1120 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }

        .login-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2rem 1.5rem;
            width: 90%;
            max-width: 340px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(139, 92, 246, 0.2);
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #A78BFA, #8B5CF6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 32px;
            color: white;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: all 0.2s;
        }

        .login-input:focus {
            border-color: #8B5CF6;
            box-shadow: 0 0 0 2px rgba(139,92,246,0.3);
        }

        .login-btn {
            background: #8B5CF6;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 800;
            font-size: 1rem;
            margin-top: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-btn:active { transform: scale(0.97); background: #7C3AED; }

        /* Main Chat App (Mobile First) */
        .app-wrapper {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: #0B0F1C;
        }

        .app-wrapper.active { display: flex; }

        /* Header like Telegram */
        .main-header {
            background: #111827;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1E293B;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-title {
            font-size: 1.35rem;
            font-weight: 800;
            background: linear-gradient(120deg, #C084FC, #8B5CF6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-badge {
            background: #1E293B;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .logout-icon {
            background: #DC2626;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* Search & tabs */
        .search-tab {
            padding: 10px 12px;
            background: #0F172A;
            border-bottom: 1px solid #1E293B;
        }

        .search-field {
            background: #1E293B;
            border: none;
            padding: 12px 18px;
            border-radius: 32px;
            width: 100%;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        /* Requests bubble */
        .requests-panel {
            background: #111827;
            margin: 6px 12px;
            border-radius: 24px;
            padding: 8px 12px;
            display: none;
            border: 1px solid #8B5CF644;
        }

        .request-chip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1E293B;
            padding: 10px 14px;
            border-radius: 48px;
            margin-bottom: 8px;
        }

        .accept-req {
            background: #22C55E;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* Friends List */
        .friends-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .friend-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            gap: 14px;
            border-bottom: 1px solid #1E293B;
            cursor: pointer;
            transition: 0.1s;
        }

        .friend-item:active { background: #1E293B; }

        .friend-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(145deg, #8B5CF6, #6D28D9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
        }

        .friend-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Chat Area */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0B0F1C;
        }

        .chat-header {
            padding: 14px 18px;
            background: #111827;
            border-bottom: 1px solid #1E293B;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: #1E293B;
            border: none;
            font-size: 1.4rem;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .chat-name {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bubble {
            max-width: 85%;
            padding: 10px 16px;
            border-radius: 24px;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .bubble-out {
            align-self: flex-end;
            background: #8B5CF6;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .bubble-in {
            align-self: flex-start;
            background: #1E293B;
            color: #F1F5F9;
            border-bottom-left-radius: 6px;
        }

        .media-preview {
            max-width: 220px;
            border-radius: 20px;
            margin-top: 5px;
        }

        .media-video {
            max-width: 240px;
            border-radius: 18px;
        }

        .input-bar {
            background: #111827;
            padding: 10px 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #1E293B;
        }

        .attach-btn {
            background: #1E293B;
            border: none;
            font-size: 1.7rem;
            padding: 8px;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .message-input {
            flex: 1;
            background: #0F172A;
            border: none;
            padding: 12px 16px;
            border-radius: 32px;
            color: white;
            font-size: 0.95rem;
            font-family: 'Cairo', sans-serif;
            resize: none;
            max-height: 100px;
        }

        .send-btn {
            background: #8B5CF6;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
        }

        .empty-chat {
            text-align: center;
            color: #64748B;
            margin-top: 40%;
        }

        /* mobile responsive */
        @media (max-width: 600px) {
            .bubble { max-width: 90%; }
            .friend-avatar { width: 48px; height: 48px; }
        }
    </style>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>
<body>

<!-- شاشة الدخول -->
<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <div class="logo">🪶 صوفي توك</div>
        <p style="margin-bottom: 20px; opacity:0.7;">دردشة خاصة و آمنة</p>
        <input type="text" id="loginUsername" class="login-input" placeholder="اسم المستخدم" autocomplete="off">
        <input type="password" id="loginPassword" class="login-input" placeholder="••••••" value="123">
        <button class="login-btn" onclick="performLogin()">دخول إلى المحادثات</button>
        <p style="font-size:12px; margin-top:12px;">✨ تجربة مثل تليجرام | أرسل صور وفيديو بسهولة</p>
    </div>
</div>

<!-- تطبيق الدردشة الرئيسي -->
<div class="app-wrapper" id="appContainer">
    <div class="main-header">
        <div class="header-title">✨ صوفي توك</div>
        <div class="user-badge" id="currentUsernameSide">...</div>
        <div class="logout-icon" onclick="logoutUser()">خروج</div>
    </div>

    <div class="search-tab">
        <input type="text" id="globalSearch" class="search-field" placeholder="🔍 بحث عن مستخدم جديد..." oninput="renderSearchResults()">
    </div>

    <!-- لوحة الطلبات -->
    <div class="requests-panel" id="requestsPanel">
        <div style="font-size:0.8rem; color:#A78BFA; margin-bottom:6px;">📩 طلبات الصداقة</div>
        <div id="requestsList"></div>
    </div>

    <!-- قائمة المحادثات (الأصدقاء) -->
    <div class="friends-list" id="friendsListContainer">
        <div style="padding: 20px; text-align:center; color:#475569;">جاري التحميل...</div>
    </div>
</div>

<!-- شاشة الدردشة المباشرة (تظهر عند اختيار صديق) -->
<div class="app-wrapper" id="chatScreen" style="display: none; flex-direction: column;">
    <div class="chat-header">
        <button class="back-btn" id="backToFriendsBtn">←</button>
        <div class="chat-name" id="chatActiveUserName">المستخدم</div>
        <div style="flex:1"></div>
    </div>
    <div class="messages-area" id="chatMessagesArea">
        <div class="empty-chat">✨ إختر محادثة وابدأ الدردشة</div>
    </div>
    <div class="input-bar">
        <label class="attach-btn" style="cursor:pointer;">📎
            <input type="file" id="attachImageInput" accept="image/*" style="display: none;" onchange="sendMediaFile('image')">
        </label>
        <label class="attach-btn" style="cursor:pointer;">🎥
            <input type="file" id="attachVideoInput" accept="video/*" style="display: none;" onchange="sendMediaFile('video')">
        </label>
        <textarea id="chatMessageInput" class="message-input" placeholder="اكتب رسالة..." rows="1"></textarea>
        <button class="send-btn" onclick="sendTextMessage()">📨</button>
    </div>
</div>

<script>
    // ---------- CONFIG ----------
    const ABLY_KEY = '_kLb1w.KqoPuA:o7et4-MjbXulWY3vGEsl_SbIS1Od7vX2MT0U6zpzrJA';
    const SYSTEM_USERS = ['3tx', '2tx', '4tx', 'Sufi', 'Baron', 'Layla', 'Zain']; // قاعدة بيانات البحث

    let currentUser = null;
    let friendsList = [];      // أسماء الأصدقاء
    let pendingRequests = [];  // طلبات وصلتني
    let activeChatWith = null;
    let ablyClient = null;
    let mainChannel = null;

    // حفظ البيانات في localStorage
    function loadUserData() {
        if(!currentUser) return;
        let savedFriends = localStorage.getItem(`friends_${currentUser}`);
        friendsList = savedFriends ? JSON.parse(savedFriends) : [];
        let savedReqs = localStorage.getItem(`requests_${currentUser}`);
        pendingRequests = savedReqs ? JSON.parse(savedReqs) : [];
    }

    function saveFriends() {
        if(currentUser) localStorage.setItem(`friends_${currentUser}`, JSON.stringify(friendsList));
    }

    function saveRequests() {
        if(currentUser) localStorage.setItem(`requests_${currentUser}`, JSON.stringify(pendingRequests));
    }

    // تحديث واجهة الأصدقاء والطلبات
    function refreshFriendsUI() {
        const container = document.getElementById('friendsListContainer');
        if(!container) return;
        container.innerHTML = '';
        
        if(friendsList.length === 0) {
            container.innerHTML = '<div style="padding: 30px; text-align:center; color:#64748B;">👋 لا يوجد أصدقاء، ابحث عن مستخدمين وأضفهم</div>';
        } else {
            friendsList.forEach(friend => {
                const friendDiv = document.createElement('div');
                friendDiv.className = 'friend-item';
                friendDiv.innerHTML = `
                    <div class="friend-avatar">👤</div>
                    <div class="friend-name">${escapeHtml(friend)}</div>
                `;
                friendDiv.onclick = () => openConversation(friend);
                container.appendChild(friendDiv);
            });
        }

        // طلبات الصداقة
        const reqPanel = document.getElementById('requestsPanel');
        const reqListDiv = document.getElementById('requestsList');
        if(pendingRequests.length > 0) {
            reqPanel.style.display = 'block';
            reqListDiv.innerHTML = '';
            pendingRequests.forEach(sender => {
                const reqItem = document.createElement('div');
                reqItem.className = 'request-chip';
                reqItem.innerHTML = `
                    <span>🫂 ${escapeHtml(sender)}</span>
                    <button class="accept-req" data-sender="${sender}">قبول</button>
                `;
                reqListDiv.appendChild(reqItem);
                reqItem.querySelector('.accept-req').onclick = (e) => {
                    e.stopPropagation();
                    acceptFriendRequest(sender);
                };
            });
        } else {
            reqPanel.style.display = 'none';
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // البحث عن مستخدمين جدد
    function renderSearchResults() {
        const term = document.getElementById('globalSearch').value.trim().toLowerCase();
        const container = document.getElementById('friendsListContainer');
        if(!term) {
            refreshFriendsUI();
            return;
        }
        const filtered = SYSTEM_USERS.filter(u => u !== currentUser && u.toLowerCase().includes(term));
        container.innerHTML = '<div style="padding: 8px 16px; color:#A78BFA; font-size:0.8rem;">🔍 نتائج البحث</div>';
        filtered.forEach(user => {
            const isAlreadyFriend = friendsList.includes(user);
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.style.justifyContent = 'space-between';
            div.innerHTML = `
                <div style="display:flex; gap:12px; align-items:center;"><span>👤</span><span>${escapeHtml(user)}</span></div>
                ${isAlreadyFriend ? '<span style="color:#22C55E;">صديق ✓</span>' : `<button class="accept-req" style="background:#8B5CF6;" id="addReqBtn">➕ إضافة</button>`}
            `;
            if(!isAlreadyFriend) {
                const btn = div.querySelector('#addReqBtn');
                btn.onclick = (e) => {
                    e.stopPropagation();
                    sendFriendRequestViaAbly(user);
                };
            } else {
                div.onclick = () => openConversation(user);
            }
            container.appendChild(div);
        });
    }

    // إرسال طلب صداقة عبر Ably
    function sendFriendRequestViaAbly(toUser) {
        if(!mainChannel) return;
        mainChannel.publish('friend-request', { from: currentUser, to: toUser });
        alert(`✅ تم إرسال طلب صداقة إلى ${toUser}`);
    }

    // قبول طلب الصداقة
    function acceptFriendRequest(fromUser) {
        // حذف من الطلبات
        pendingRequests = pendingRequests.filter(r => r !== fromUser);
        saveRequests();
        // إضافة كصديق
        if(!friendsList.includes(fromUser)) {
            friendsList.push(fromUser);
            saveFriends();
        }
        // إعلام الطرف الآخر بأن الطلب قُبل
        if(mainChannel) {
            mainChannel.publish('accept-request', { from: currentUser, to: fromUser });
        }
        refreshFriendsUI();
        // إذا كان البحث مفتوح نعيد تحديث العرض
        renderSearchResults();
    }

    // استقبال الحدود من Ably
    function setupAblyListener() {
        if(!ablyClient) return;
        mainChannel = ablyClient.channels.get('sufi-global');
        mainChannel.subscribe((message) => {
            const data = message.data;
            // طلب صداقة موجه لي
            if(message.name === 'friend-request' && data.to === currentUser) {
                if(!pendingRequests.includes(data.from) && !friendsList.includes(data.from)) {
                    pendingRequests.push(data.from);
                    saveRequests();
                    refreshFriendsUI();
                }
            }
            // قبول طلب صداقة موجه لي
            if(message.name === 'accept-request' && data.to === currentUser) {
                if(!friendsList.includes(data.from)) {
                    friendsList.push(data.from);
                    saveFriends();
                    refreshFriendsUI();
                    renderSearchResults();
                }
            }
            // رسالة خاصة بيني وبين صديق
            if(message.name === 'private-msg') {
                const msg = data;
                if((msg.to === currentUser && msg.from === activeChatWith) || (msg.from === currentUser && msg.to === activeChatWith)) {
                    appendMessageToChat(msg, msg.from === currentUser);
                }
                // حفظ التاريخ بغض النظر عن الدردشة المفتوحة
                saveMessageHistory(msg);
                // إذا كانت الدردشة المفتوحة مختلفة وجاءت رسالة نحدث الـ badge (اختياري)
                if(msg.to === currentUser && msg.from !== activeChatWith) {
                    // تنبيه وهمي بسيط - تحديث الواجهة بدون تغيير
                }
            }
        });
    }

    // فتح دردشة مع صديق
    function openConversation(friendName) {
        activeChatWith = friendName;
        document.getElementById('appContainer').style.display = 'none';
        const chatScreen = document.getElementById('chatScreen');
        chatScreen.style.display = 'flex';
        document.getElementById('chatActiveUserName').innerText = friendName;
        const msgsArea = document.getElementById('chatMessagesArea');
        msgsArea.innerHTML = '';
        // تحميل التاريخ
        const history = loadHistoryForChat(friendName);
        if(history.length === 0) {
            msgsArea.innerHTML = '<div class="empty-chat">💬 ابدأ المحادثة الآن</div>';
        } else {
            history.forEach(msg => {
                const isMine = msg.from === currentUser;
                appendMessageToChat(msg, isMine, false);
            });
        }
        scrollChatToBottom();
    }

    function loadHistoryForChat(friend) {
        const key = `chatlog_${currentUser}_${friend}`;
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : [];
    }

    function saveMessageHistory(msg) {
        const other = msg.from === currentUser ? msg.to : msg.from;
        const key = `chatlog_${currentUser}_${other}`;
        const history = loadHistoryForChat(other);
        history.push(msg);
        localStorage.setItem(key, JSON.stringify(history));
    }

    function appendMessageToChat(msg, isMine, saveScroll = true) {
        const container = document.getElementById('chatMessagesArea');
        if(!container) return;
        // إزالة رسالة "ابدأ المحادثة"
        if(container.querySelector('.empty-chat')) container.innerHTML = '';
        
        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = `bubble ${isMine ? 'bubble-out' : 'bubble-in'}`;
        
        if(msg.type === 'text') {
            bubbleDiv.innerText = msg.content;
        } else if(msg.type === 'image') {
            const img = document.createElement('img');
            img.src = msg.content;
            img.className = 'media-preview';
            img.style.maxWidth = '200px';
            img.style.borderRadius = '18px';
            bubbleDiv.appendChild(img);
        } else if(msg.type === 'video') {
            const video = document.createElement('video');
            video.src = msg.content;
            video.controls = true;
            video.className = 'media-video';
            video.style.maxWidth = '220px';
            video.style.borderRadius = '16px';
            bubbleDiv.appendChild(video);
        }
        container.appendChild(bubbleDiv);
        if(saveScroll) scrollChatToBottom();
    }

    function scrollChatToBottom() {
        const area = document.getElementById('chatMessagesArea');
        if(area) area.scrollTop = area.scrollHeight;
    }

    // إرسال رسالة نصية
    function sendTextMessage() {
        const inputField = document.getElementById('chatMessageInput');
        const text = inputField.value.trim();
        if(!text || !activeChatWith) return;
        const msgObj = {
            from: currentUser,
            to: activeChatWith,
            type: 'text',
            content: text,
            timestamp: Date.now()
        };
        // publish عبر ably
        if(mainChannel) mainChannel.publish('private-msg', msgObj);
        // اظهار فوراً في الواجهة
        appendMessageToChat(msgObj, true);
        saveMessageHistory(msgObj);
        inputField.value = '';
    }

    // إرسال ملف (صورة أو فيديو) بطريقة صحيحة
    function sendMediaFile(type) {
        if(!activeChatWith) {
            alert("افتح محادثة مع صديق أولاً");
            return;
        }
        let inputElem = null;
        if(type === 'image') inputElem = document.getElementById('attachImageInput');
        else inputElem = document.getElementById('attachVideoInput');
        
        const file = inputElem.files[0];
        if(!file) return;
        
        // التحقق من حجم الملف (حد أقصى 8 ميجا مناسب للعرض)
        if(file.size > 8 * 1024 * 1024) {
            alert("الملف كبير جداً، الرجاء اختيار ملف أقل من 8 ميجابايت");
            inputElem.value = '';
            return;
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64 = e.target.result;
            const msgMedia = {
                from: currentUser,
                to: activeChatWith,
                type: type,
                content: base64,
                timestamp: Date.now()
            };
            if(mainChannel) mainChannel.publish('private-msg', msgMedia);
            appendMessageToChat(msgMedia, true);
            saveMessageHistory(msgMedia);
            // مسح قيمة input عشان نقدر نختار مرة ثانية
            inputElem.value = '';
        };
        reader.onerror = function() {
            alert("حدث خطأ أثناء قراءة الملف، حاول مرة أخرى");
            inputElem.value = '';
        };
        reader.readAsDataURL(file);
    }

    // رجوع إلى قائمة الأصدقاء
    function backToFriends() {
        document.getElementById('chatScreen').style.display = 'none';
        document.getElementById('appContainer').style.display = 'flex';
        activeChatWith = null;
        refreshFriendsUI();
        renderSearchResults(); // تحديث البحث لو فاتح
    }

    // تسجيل الخروج
    function logoutUser() {
        if(ablyClient) ablyClient.close();
        localStorage.removeItem('sufi_current_user');
        window.location.reload();
    }

    // عملية الدخول
    function performLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const pass = document.getElementById('loginPassword').value;
        if(!username) {
            alert("يرجى إدخال اسم المستخدم");
            return;
        }
        if(pass !== "123" && pass !== "1234") {
            alert("كلمة المرور الافتراضية: 123 (تجريبي)");
            return;
        }
        currentUser = username;
        localStorage.setItem('sufi_current_user', currentUser);
        loadUserData();
        initAppAfterLogin();
    }

    function initAppAfterLogin() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appContainer').style.display = 'flex';
        document.getElementById('currentUsernameSide').innerText = currentUser;
        
        // تهيئة Ably
        ablyClient = new Ably.Realtime(ABLY_KEY);
        ablyClient.connection.on('connected', () => {
            console.log("✅ متصل بالخادم المباشر");
            setupAblyListener();
        });
        
        refreshFriendsUI();
        
        // إظهار البحث الأولي
        document.getElementById('globalSearch').addEventListener('input', () => renderSearchResults());
        document.getElementById('backToFriendsBtn').onclick = () => backToFriends();
        
        // إضافة مستمع إدخال enter
        const msgTextarea = document.getElementById('chatMessageInput');
        msgTextarea.addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendTextMessage();
            }
        });
    }

    // استعادة الجلسة
    window.onload = () => {
        const savedUser = localStorage.getItem('sufi_current_user');
        if(savedUser) {
            currentUser = savedUser;
            loadUserData();
            initAppAfterLogin();
        } else {
            document.getElementById('loginScreen').style.display = 'flex';
        }
    };
</script>
</body>
</html>

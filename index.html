<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>صوفي توك - تواصل فوري</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Cairo', sans-serif;
            background: #0a0a0a;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2rem;
            width: 85%;
            max-width: 320px;
            text-align: center;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .login-card h1 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .login-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #1a1a2e;
            border: 1px solid #2d2d44;
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .login-input:focus {
            border-color: #a855f7;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #a855f7, #ec4899);
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 15px;
            cursor: pointer;
        }

        .app-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: #0f0f1a;
        }

        .app-container.active {
            display: flex;
        }

        .tabs {
            display: flex;
            background: #1a1a2e;
            padding: 8px 16px;
            gap: 8px;
            border-bottom: 1px solid #2d2d44;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #888;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: #2d2d44;
            color: #a855f7;
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        .content-header {
            padding: 16px;
            background: #1a1a2e;
            border-bottom: 1px solid #2d2d44;
        }

        .content-header h3 {
            font-size: 1.2rem;
            color: white;
        }

        .chat-list, .users-list, .requests-list {
            padding: 8px;
        }

        .chat-item, .user-item, .request-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #1a1a2e;
            border-radius: 16px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .chat-info {
            flex: 1;
            margin-right: 12px;
        }

        .chat-name {
            font-weight: bold;
            color: white;
            margin-bottom: 4px;
        }

        .chat-last-msg {
            font-size: 0.75rem;
            color: #888;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-icon {
            font-size: 0.7rem;
        }

        .status-sent { color: #888; }
        .status-delivered { color: #a855f7; }
        .status-read { color: #34b7f1; }

        .search-box {
            padding: 12px;
            background: #1a1a2e;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            background: #0f0f1a;
            border: 1px solid #2d2d44;
            border-radius: 28px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .add-friend-btn, .accept-btn {
            background: linear-gradient(45deg, #a855f7, #ec4899);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .accept-btn {
            background: #22c55e;
        }

        .chat-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: #0f0f1a;
        }

        .chat-screen.active {
            display: flex;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #1a1a2e;
            border-bottom: 1px solid #2d2d44;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: white;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-weight: bold;
            color: white;
            font-size: 1.1rem;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .message-out {
            align-self: flex-end;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-in {
            align-self: flex-start;
            background: #1a1a2e;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.6rem;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
        }

        .media-message {
            max-width: 200px;
            border-radius: 12px;
            margin-top: 4px;
        }

        .input-area {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: #1a1a2e;
            border-top: 1px solid #2d2d44;
        }

        .attach-btn {
            background: #2d2d44;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-input {
            flex: 1;
            background: #0f0f1a;
            border: none;
            padding: 12px;
            border-radius: 24px;
            color: white;
            font-size: 0.9rem;
            resize: none;
            font-family: inherit;
        }

        .send-btn {
            background: linear-gradient(45deg, #a855f7, #ec4899);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
        }
    </style>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h1>🪶 صوفي توك</h1>
        <input type="text" id="usernameInput" class="login-input" placeholder="اسم المستخدم">
        <input type="password" id="passwordInput" class="login-input" placeholder="كلمة المرور" value="123">
        <button class="login-btn" onclick="login()">دخول</button>
    </div>
</div>

<div class="app-container" id="appContainer">
    <div class="tabs">
        <div class="tab active" data-tab="chats">💬 محادثات</div>
        <div class="tab" data-tab="contacts">👥 جهات الاتصال</div>
        <div class="tab" data-tab="requests">📨 الطلبات</div>
    </div>

    <div class="tab-content active" id="chatsTab">
        <div class="content-header">
            <h3>المحادثات</h3>
        </div>
        <div class="chat-list" id="chatsList"></div>
    </div>

    <div class="tab-content" id="contactsTab">
        <div class="content-header">
            <h3>جهات الاتصال</h3>
        </div>
        <div class="search-box">
            <input type="text" id="searchUsers" class="search-input" placeholder="🔍 بحث عن مستخدم...">
        </div>
        <div class="users-list" id="usersList"></div>
    </div>

    <div class="tab-content" id="requestsTab">
        <div class="content-header">
            <h3>طلبات الصداقة</h3>
        </div>
        <div class="requests-list" id="requestsListTab"></div>
    </div>
</div>

<div class="chat-screen" id="chatScreen">
    <div class="chat-header">
        <button class="back-btn" onclick="closeChat()">←</button>
        <div class="chat-header-info">
            <div class="chat-header-name" id="chatUserName">...</div>
        </div>
    </div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="input-area">
        <label class="attach-btn">📷
            <input type="file" id="imageInput" accept="image/*" hidden onchange="sendImage()">
        </label>
        <label class="attach-btn">🎥
            <input type="file" id="videoInput" accept="video/*" hidden onchange="sendVideo()">
        </label>
        <textarea id="messageInput" class="message-input" placeholder="اكتب رسالة..." rows="1"></textarea>
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    const ABLY_KEY = '_kLb1w.KqoPuA:o7et4-MjbXulWY3vGEsl_SbIS1Od7vX2MT0U6zpzrJA';
    const ALL_USERS = ['Sufi', 'Baron', '3tx', '2tx', '4tx', 'Layla', 'Zain', 'Amir', 'Hasan'];

    let currentUser = null;
    let friends = [];
    let requests = [];
    let activeChat = null;
    let ably = null;
    let channel = null;

    function login() {
        const user = document.getElementById('usernameInput').value.trim();
        if(!user) {
            alert('ادخل اسم المستخدم');
            return;
        }
        currentUser = user;
        loadData();
        initAbly();
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appContainer').classList.add('active');
        updateAllUI();
        setupTabs();
        setupSearch();
    }

    function loadData() {
        friends = JSON.parse(localStorage.getItem(`friends_${currentUser}`) || '[]');
        requests = JSON.parse(localStorage.getItem(`requests_${currentUser}`) || '[]');
    }

    function saveData() {
        localStorage.setItem(`friends_${currentUser}`, JSON.stringify(friends));
        localStorage.setItem(`requests_${currentUser}`, JSON.stringify(requests));
    }

    function initAbly() {
        ably = new Ably.Realtime(ABLY_KEY);
        channel = ably.channels.get('sufi_chat');
        
        channel.subscribe((message) => {
            const data = message.data;
            
            if(message.name === 'friend_request' && data.to === currentUser) {
                if(!requests.includes(data.from) && !friends.includes(data.from)) {
                    requests.push(data.from);
                    saveData();
                    updateAllUI();
                }
            }
            
            if(message.name === 'accept_request' && data.to === currentUser) {
                if(!friends.includes(data.from)) {
                    friends.push(data.from);
                    saveData();
                    updateAllUI();
                }
            }
            
            if(message.name === 'private_message') {
                const msg = data;
                if(msg.to === currentUser || msg.from === currentUser) {
                    const other = msg.from === currentUser ? msg.to : msg.from;
                    
                    // حفظ الرسالة
                    saveMessageToStorage(other, msg);
                    
                    // تحديث حالة الرسالة إذا كانت واصلة
                    if(msg.status === 'delivered' && msg.to === currentUser) {
                        updateMessageStatusInStorage(msg.messageId, 'delivered');
                        
                        // إذا كانت الدردشة مفتوحة، أرسل إشعار قراءة
                        if(activeChat === msg.from) {
                            sendReadReceipt(msg.messageId, msg.from);
                        }
                    }
                    
                    if(msg.status === 'read' && msg.to === currentUser) {
                        updateMessageStatusInStorage(msg.messageId, 'read');
                    }
                    
                    // تحديث واجهة الدردشة إذا كانت مفتوحة
                    if(activeChat === other) {
                        refreshChatMessages();
                    }
                    
                    // تحديث قائمة المحادثات
                    updateChatsList();
                }
            }
        });
    }

    function sendFriendRequest(to) {
        channel.publish('friend_request', { from: currentUser, to: to });
        alert(`✅ تم إرسال طلب صداقة إلى ${to}`);
    }

    function acceptRequest(from) {
        requests = requests.filter(r => r !== from);
        if(!friends.includes(from)) {
            friends.push(from);
        }
        saveData();
        channel.publish('accept_request', { from: currentUser, to: from });
        updateAllUI();
    }

    function openChat(user) {
        activeChat = user;
        document.getElementById('appContainer').classList.remove('active');
        document.getElementById('chatScreen').classList.add('active');
        document.getElementById('chatUserName').innerText = user;
        refreshChatMessages();
        
        // إرسال إشعارات قراءة للرسائل غير المقروءة
        const messages = getAllMessagesForChat(user);
        messages.forEach(msg => {
            if(msg.to === currentUser && msg.status !== 'read') {
                sendReadReceipt(msg.messageId, msg.from);
                updateMessageStatusInStorage(msg.messageId, 'read');
            }
        });
    }

    function closeChat() {
        activeChat = null;
        document.getElementById('chatScreen').classList.remove('active');
        document.getElementById('appContainer').classList.add('active');
        updateAllUI();
    }

    function sendMessage() {
        const text = document.getElementById('messageInput').value.trim();
        if(!text || !activeChat) return;
        
        const messageId = Date.now() + '_' + Math.random();
        const message = {
            messageId: messageId,
            from: currentUser,
            to: activeChat,
            type: 'text',
            content: text,
            time: Date.now(),
            status: 'sent'
        };
        
        saveMessageToStorage(activeChat, message);
        refreshChatMessages();
        document.getElementById('messageInput').value = '';
        
        channel.publish('private_message', message);
        
        setTimeout(() => {
            updateMessageStatusInStorage(messageId, 'delivered');
            const deliveredMsg = {...message, status: 'delivered'};
            channel.publish('private_message', deliveredMsg);
            refreshChatMessages();
        }, 500);
        
        updateChatsList();
        scrollToBottom();
    }

    function sendImage() {
        const file = document.getElementById('imageInput').files[0];
        if(!file || !activeChat) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const messageId = Date.now() + '_' + Math.random();
            const message = {
                messageId: messageId,
                from: currentUser,
                to: activeChat,
                type: 'image',
                content: e.target.result,
                time: Date.now(),
                status: 'sent'
            };
            saveMessageToStorage(activeChat, message);
            refreshChatMessages();
            channel.publish('private_message', message);
            
            setTimeout(() => {
                updateMessageStatusInStorage(messageId, 'delivered');
                const deliveredMsg = {...message, status: 'delivered'};
                channel.publish('private_message', deliveredMsg);
                refreshChatMessages();
            }, 500);
            
            updateChatsList();
            scrollToBottom();
        };
        reader.readAsDataURL(file);
        document.getElementById('imageInput').value = '';
    }

    function sendVideo() {
        const file = document.getElementById('videoInput').files[0];
        if(!file || !activeChat) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const messageId = Date.now() + '_' + Math.random();
            const message = {
                messageId: messageId,
                from: currentUser,
                to: activeChat,
                type: 'video',
                content: e.target.result,
                time: Date.now(),
                status: 'sent'
            };
            saveMessageToStorage(activeChat, message);
            refreshChatMessages();
            channel.publish('private_message', message);
            
            setTimeout(() => {
                updateMessageStatusInStorage(messageId, 'delivered');
                const deliveredMsg = {...message, status: 'delivered'};
                channel.publish('private_message', deliveredMsg);
                refreshChatMessages();
            }, 500);
            
            updateChatsList();
            scrollToBottom();
        };
        reader.readAsDataURL(file);
        document.getElementById('videoInput').value = '';
    }

    function sendReadReceipt(messageId, fromUser) {
        const receipt = {
            messageId: messageId,
            from: currentUser,
            to: fromUser,
            status: 'read',
            type: 'receipt'
        };
        channel.publish('private_message', receipt);
        updateMessageStatusInStorage(messageId, 'read');
    }

    function saveMessageToStorage(friend, message) {
        const key = `chat_${currentUser}_${friend}`;
        let messages = JSON.parse(localStorage.getItem(key) || '[]');
        const existingIndex = messages.findIndex(m => m.messageId === message.messageId);
        if(existingIndex !== -1) {
            messages[existingIndex] = message;
        } else {
            messages.push(message);
        }
        localStorage.setItem(key, JSON.stringify(messages));
    }

    function updateMessageStatusInStorage(messageId, newStatus) {
        // البحث في جميع محادثات المستخدم
        for(let friend of [...friends, ...requests]) {
            const key = `chat_${currentUser}_${friend}`;
            let messages = JSON.parse(localStorage.getItem(key) || '[]');
            let updated = false;
            messages.forEach(msg => {
                if(msg.messageId === messageId && msg.status !== 'read') {
                    msg.status = newStatus;
                    updated = true;
                }
            });
            if(updated) {
                localStorage.setItem(key, JSON.stringify(messages));
            }
        }
    }

    function getAllMessagesForChat(friend) {
        const key = `chat_${currentUser}_${friend}`;
        return JSON.parse(localStorage.getItem(key) || '[]');
    }

    function getAllChats() {
        const chats = new Set();
        // جمع جميع الأصدقاء الذين لديهم محادثات
        for(let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if(key && key.startsWith(`chat_${currentUser}_`)) {
                const friend = key.replace(`chat_${currentUser}_`, '');
                chats.add(friend);
            }
        }
        // إضافة الأصدقاء الحاليين
        friends.forEach(f => chats.add(f));
        return Array.from(chats);
    }

    function getLastMessage(friend) {
        const messages = getAllMessagesForChat(friend);
        return messages[messages.length - 1];
    }

    function getStatusIcon(status) {
        if(status === 'sent') return '✓';
        if(status === 'delivered') return '✓✓';
        if(status === 'read') return '✓✓';
        return '✓';
    }

    function getStatusColor(status) {
        if(status === 'sent') return '#888';
        if(status === 'delivered') return '#a855f7';
        if(status === 'read') return '#34b7f1';
        return '#888';
    }

    function refreshChatMessages() {
        if(!activeChat) return;
        const messages = getAllMessagesForChat(activeChat);
        const area = document.getElementById('messagesArea');
        area.innerHTML = '';
        
        if(messages.length === 0) {
            area.innerHTML = '<div style="text-align:center;color:#888;margin-top:50px;">✨ ابدأ المحادثة الآن</div>';
        } else {
            messages.forEach(msg => {
                const isOut = msg.from === currentUser;
                const div = document.createElement('div');
                div.className = `message ${isOut ? 'message-out' : 'message-in'}`;
                
                if(msg.type === 'text') {
                    div.innerHTML = `${escapeHtml(msg.content)}`;
                } else if(msg.type === 'image') {
                    div.innerHTML = `<img src="${msg.content}" class="media-message" style="max-width:200px;border-radius:12px;">`;
                } else if(msg.type === 'video') {
                    div.innerHTML = `<video src="${msg.content}" controls class="media-message" style="max-width:200px;border-radius:12px;"></video>`;
                }
                
                if(isOut) {
                    const timeDiv = document.createElement('div');
                    timeDiv.className = 'message-time';
                    const statusIcon = getStatusIcon(msg.status);
                    const statusColor = getStatusColor(msg.status);
                    timeDiv.innerHTML = `<span style="color:${statusColor}">${statusIcon}</span>`;
                    div.appendChild(timeDiv);
                }
                
                area.appendChild(div);
            });
        }
        scrollToBottom();
    }

    function updateChatsList() {
        const container = document.getElementById('chatsList');
        if(!container) return;
        
        const allChats = getAllChats();
        if(allChats.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#888;padding:40px;">لا توجد محادثات</div>';
            return;
        }
        
        container.innerHTML = '';
        allChats.forEach(friend => {
            const lastMsg = getLastMessage(friend);
            let lastMsgText = 'لا توجد رسائل';
            let lastMsgStatus = '';
            
            if(lastMsg) {
                if(lastMsg.type === 'text') lastMsgText = lastMsg.content.substring(0, 30);
                else if(lastMsg.type === 'image') lastMsgText = '📷 صورة';
                else if(lastMsg.type === 'video') lastMsgText = '🎥 فيديو';
                
                if(lastMsg.from === currentUser) {
                    lastMsgStatus = getStatusIcon(lastMsg.status);
                }
            }
            
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `
                <div style="display:flex; align-items:center; gap:12px; flex:1;">
                    <div style="width:48px;height:48px;background:linear-gradient(135deg,#a855f7,#ec4899);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;">👤</div>
                    <div class="chat-info">
                        <div class="chat-name">${escapeHtml(friend)}</div>
                        <div class="chat-last-msg">
                            <span>${escapeHtml(lastMsgText)}</span>
                            <span class="status-icon" style="color:${getStatusColor(lastMsg.status)}">${lastMsgStatus}</span>
                        </div>
                    </div>
                </div>
            `;
            div.onclick = () => openChat(friend);
            container.appendChild(div);
        });
    }

    function updateUsersList() {
        const container = document.getElementById('usersList');
        const searchTerm = document.getElementById('searchUsers')?.value.toLowerCase() || '';
        
        const filtered = ALL_USERS.filter(u => 
            u !== currentUser && 
            !friends.includes(u) &&
            u.toLowerCase().includes(searchTerm)
        );
        
        container.innerHTML = '';
        if(filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#888;padding:40px;">لا يوجد مستخدمين</div>';
            return;
        }
        
        filtered.forEach(user => {
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerHTML = `
                <div style="display:flex; align-items:center; gap:12px;">
                    <div style="width:40px;height:40px;background:linear-gradient(135deg,#a855f7,#ec4899);border-radius:50%;display:flex;align-items:center;justify-content:center;">👤</div>
                    <span>${escapeHtml(user)}</span>
                </div>
                <button class="add-friend-btn" onclick="sendFriendRequest('${user}')">➕ إضافة</button>
            `;
            container.appendChild(div);
        });
    }

    function updateRequestsList() {
        const container = document.getElementById('requestsListTab');
        if(!container) return;
        container.innerHTML = '';
        
        if(requests.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#888;padding:40px;">لا توجد طلبات صداقة</div>';
            return;
        }
        
        requests.forEach(req => {
            const div = document.createElement('div');
            div.className = 'request-item';
            div.innerHTML = `
                <div style="display:flex; align-items:center; gap:12px;">
                    <div style="width:40px;height:40px;background:linear-gradient(135deg,#a855f7,#ec4899);border-radius:50%;display:flex;align-items:center;justify-content:center;">👤</div>
                    <span>${escapeHtml(req)}</span>
                </div>
                <button class="accept-btn" onclick="acceptRequest('${req}')">قبول</button>
            `;
            container.appendChild(div);
        });
    }

    function updateAllUI() {
        updateChatsList();
        updateUsersList();
        updateRequestsList();
    }

    function setupTabs() {
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                const tabId = tab.getAttribute('data-tab');
                document.getElementById(`${tabId}Tab`).classList.add('active');
                if(tabId === 'contacts') updateUsersList();
                if(tabId === 'requests') updateRequestsList();
            };
        });
    }

    function setupSearch() {
        const searchInput = document.getElementById('searchUsers');
        if(searchInput) {
            searchInput.addEventListener('input', () => updateUsersList());
        }
    }

    function scrollToBottom() {
        const area = document.getElementById('messagesArea');
        if(area) setTimeout(() => { area.scrollTop = area.scrollHeight; }, 100);
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        const msgInput = document.getElementById('messageInput');
        if(msgInput) {
            msgInput.addEventListener('keypress', (e) => {
                if(e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }
    });
</script>
</body>
</html>
